name: Update ISPB data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Fetch fresh data
        run: npm run generate

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet src/data.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changed — will bump and publish."
          fi

      - name: Bump version, commit and publish
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version patch --no-git-tag-version
          git add src/data.ts package.json package-lock.json
          git commit -m "chore: auto-update ISPB data ($(date -u '+%Y-%m-%d'))"
          git push
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
