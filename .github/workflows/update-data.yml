name: Update ISPB data

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: pnpm install

      - name: Fetch fresh data
        run: pnpm generate

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet packages/ispb-participants/src/data.ts; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No data changes."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data changed — will bump and publish."
          fi

      - name: Bump version, commit and publish
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cd packages/ispb-participants
          npm version patch --no-git-tag-version
          cd ../..
          git add packages/ispb-participants/src/data.ts packages/ispb-participants/package.json pnpm-lock.yaml
          git commit -m "chore: auto-update ISPB data ($(date -u '+%Y-%m-%d'))"
          git push
          pnpm --filter @thiagoprazeres/ispb-participants publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
